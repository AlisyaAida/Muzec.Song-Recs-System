<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

<!-- Navigation -->
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
  <div class="container">
    <a class="navbar-brand fw-bold" href="home.html">
      <i class="bi bi-music-note-beamed"></i> Muzec
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="home.html"><i class="bi bi-house-door"></i> Home</a></li>
        <li class="nav-item"><a class="nav-link active" href="recommendations.html"><i class="bi bi-stars"></i> Recommendations</a></li>
        <li class="nav-item"><a class="nav-link" href="favorites.html"><i class="bi bi-heart"></i> Favorites</a></li>
        <li class="nav-item"><a class="nav-link" href="profile.html"><i class="bi bi-person"></i> Profile</a></li>
      </ul>
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="login.html"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Main Content -->
<main class="flex-grow-1 py-4">
  <div class="container">
    <div class="mb-4">
      <h1 class="h3 mb-1"><i class="bi bi-stars"></i> Find Your Music</h1>
      <p class="text-muted mb-0 small">Tell us your mood and we'll recommend a song</p>
    </div>

    <div class="row g-4">

      <!-- Recommendation Form -->
      <div class="col-lg-6">
        <div class="card shadow-sm h-100">
          <div class="card-header bg-white">
            <h5 class="mb-0"><i class="bi bi-sliders"></i> Your Preferences</h5>
          </div>
          <div class="card-body">
            <form>
              <div class="mb-3">
                <label for="mood" class="form-label">How do you feel?</label>
                <select class="form-select" id="mood">
                  <option>Happy</option>
                  <option>Neutral</option>
                  <option>Sad</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="genre" class="form-label">Favorite Genre</label>
                <input type="text" class="form-control" id="genre" placeholder="e.g. Pop, Rock, Hip-Hop">
              </div>

              <div class="mb-3">
                <label for="language" class="form-label">Language</label>
                <select class="form-select" id="language">
                  <option>Any</option>
                  <option>English</option>
                  <option>Malay</option>
                  <option>Mandarin</option>
                  <option>Korean</option>
                  <option>Japanese</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="songAge" class="form-label">Song Age</label>
                <select class="form-select" id="songAge">
                  <option>Up to 10 years</option>
                  <option>Up to 20 years</option>
                  <option>Up to 30 years</option>
                  <option>Any</option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label">Appropriateness</label>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="appropriate" id="app1" checked>
                  <label class="form-check-label" for="app1">All ages</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="appropriate" id="app2">
                  <label class="form-check-label" for="app2">Explicit allowed</label>
                </div>
              </div>

              <div class="d-grid">
                <button type="submit" class="btn btn-primary">
                  <i class="bi bi-magic"></i> Get Recommendation
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <!-- Recommendation Result -->
      <div class="col-lg-6">
        <div class="card shadow-sm h-100">
          <div class="card-header bg-white">
            <h5 class="mb-0"><i class="bi bi-headphones"></i> Recommended For You</h5>
          </div>
          <div class="card-body d-flex flex-column">

            <!-- Song card -->
            <div class="card bg-light border-0 mb-3">
              <div class="card-body text-center p-4">
                <i class="bi bi-vinyl display-1 text-muted mb-3"></i>
                <h4 class="card-title mb-1">Enemy</h4>
                <p class="text-muted mb-2">Imagine Dragons</p>
                <span class="badge bg-secondary me-1">Pop</span>
                <span class="badge bg-secondary">2021</span>
              </div>
            </div>

            <!-- Feedback -->
            <p class="text-center text-muted small mb-2">Do you like it?</p>
            <div class="btn-group mb-3" role="group" aria-label="Feedback">
              <button type="button" class="btn btn-outline-success">
                <i class="bi bi-hand-thumbs-up"></i> Like
              </button>
              <button type="button" class="btn btn-outline-danger">
                <i class="bi bi-hand-thumbs-down"></i> Dislike
              </button>
            </div>

            <!-- Actions -->
            <div class="d-grid gap-2 mt-auto">
              <button type="button" class="btn btn-primary">
                <i class="bi bi-heart-fill"></i> Add to Favorites
              </button>
              <div class="row g-2">
                <div class="col">
                  <a href="#" class="btn btn-outline-secondary w-100">
                    <i class="bi bi-youtube"></i> YouTube
                  </a>
                </div>
                <div class="col">
                  <button type="button" class="btn btn-outline-secondary w-100">
                    <i class="bi bi-arrow-clockwise"></i> Another
                  </button>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>

    </div>
  </div>
</main>

<!-- Footer -->
<footer class="bg-white border-top py-3 mt-auto">
  <div class="container text-center text-muted small">
    &copy; 2026 Muzec. All Rights Reserved.
  </div>
</footer>

</body>
</html>
